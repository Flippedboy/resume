name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build
        run: npx vite build --outDir dist --emptyOutDir
        env:
          CLIENT_BASE_PATH: /
          ASSETS_CDN_PATH: /
          NODE_ENV: production
      - name: Fill template placeholders for static hosting
        run: |
          python3 - <<'PY'
          import pathlib
          p = pathlib.Path("dist/index.html")
          s = p.read_text(encoding="utf-8")
          s = s.replace("{{{appAvatar}}}", "/favicon.svg")
          s = s.replace("{{appAvatar}}", "/favicon.svg")
          s = s.replace("{{appName}}", "\u83ab\u8d24\u6587-AI\u5f00\u53d1\u7b80\u5386")
          s = s.replace("{{appDescription}}", "AI\u5927\u6a21\u578b\u5f00\u53d1\u5de5\u7a0b\u5e08\u4e2a\u4eba\u7b80\u5386")
          for ph in ["{{appId}}", "{{userId}}", "{{tenantId}}", "{{userName}}", "{{csrfToken}}"]:
              s = s.replace(ph, "")
          s = s.replace("{{environment}}", "production")
          p.write_text(s, encoding="utf-8")
          import re
          left = re.findall(r"{{[^}]*}}", s)
          if left:
              raise SystemExit("Leftover placeholders: " + str(left))
          print("title:", re.search(r"<title>[^<]*</title>", s).group(0))
          PY
      - name: Disable Jekyll
        run: touch dist/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
