name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build
        run: npx vite build --outDir dist --emptyOutDir
        env:
          CLIENT_BASE_PATH: /resume/
          ASSETS_CDN_PATH: /resume/
          NODE_ENV: production
      
      # 复制index生成404.html（放在模板替换之后，保证内容同步更新）
      - name: Copy index.html to 404.html
        run: cp dist/index.html dist/404.html
      # 禁止Jekyll处理下划线资源文件
      - name: Disable Jekyll
        run: touch dist/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
